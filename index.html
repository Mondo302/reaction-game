<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reaction Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

  <!-- Three.js canvas — fullscreen, visually dominant, non-interactive.
       pointer-events:none ensures all clicks pass through to #app. -->
  <div id="canvas-container"></div>

  <!-- UI shell — the entire viewport is clickable for game input.
       All text/controls live in a side panel, leaving the center
       clear for the 3D scene to be the visual hero. -->
  <div id="app">

    <div class="side-panel" id="side-panel">
      <header class="header">
        <div class="header__title">REACTION TIMER</div>
        <div class="header__subtitle">Measure your response latency</div>
      </header>

      <!-- Reaction time readout -->
      <div class="result-display" id="result-display">
        <div class="result-display__value" id="result-value">---</div>
        <div class="result-display__unit" id="result-unit">ms</div>
      </div>

      <div class="prompt-text" id="prompt-text">Click anywhere to start</div>

      <div class="divider"></div>

      <!-- Stats panel — only meaningful after 5+ attempts -->
      <div class="stats" id="stats-panel">
        <div class="stats__notice" id="stats-notice">Complete 5 attempts to see statistics</div>
        <div class="stats__grid" id="stats-grid">
          <div class="stats__item">
            <div class="stats__label">Average</div>
            <div class="stats__value" id="stat-avg">—</div>
          </div>
          <div class="stats__item">
            <div class="stats__label">Best</div>
            <div class="stats__value stats__value--best" id="stat-best">—</div>
          </div>
          <div class="stats__item">
            <div class="stats__label">Worst</div>
            <div class="stats__value stats__value--worst" id="stat-worst">—</div>
          </div>
          <div class="stats__item">
            <div class="stats__label">Attempts</div>
            <div class="stats__value" id="stat-count">0</div>
          </div>
        </div>
      </div>

      <!-- Attempt history log -->
      <div class="history" id="history-panel">
        <div class="history__title">Session Log</div>
        <div class="history__list" id="history-list"></div>
      </div>

      <div class="panel-footer">
        <button class="reset-btn" id="reset-btn">Reset Session</button>
      </div>
    </div>

  </div>

  <style>
    /* =========================================================
       1. CSS CUSTOM PROPERTIES / DESIGN TOKENS
       ========================================================= */
    :root {
      --bg: #0F1117;
      --surface: #1C1F26;
      --border: #2E3138;
      --text-primary: #E8EAF0;
      --text-secondary: #8B909A;
      --accent-stimulus: #4A9EFF;
      --accent-error: #E05555;
      --accent-success: #4CAF7D;
      --font-ui: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --radius: 8px;
      --transition-fast: 150ms ease;
      --transition-med: 300ms ease;
      --panel-width: 340px;
    }

    /* =========================================================
       2. RESET AND BASE STYLES
       ========================================================= */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font-ui);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* =========================================================
       3. LAYOUT
       Desktop: fullscreen 3D + fixed right side panel.
       Mobile (<768px): 3D on top + bottom sheet panel.
       ========================================================= */
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    #canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #app {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }

    .side-panel {
      position: absolute;
      top: 0;
      right: 0;
      width: var(--panel-width);
      height: 100%;
      background: rgba(15, 17, 23, 0.92);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 2rem 1.5rem;
      overflow-y: auto;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin: 0.25rem 0 1.25rem;
    }

    /* =========================================================
       4. COMPONENTS
       ========================================================= */
    .header {
      margin-bottom: 1.5rem;
    }

    .header__title {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      color: var(--text-secondary);
    }

    .header__subtitle {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 0.25rem;
      opacity: 0.5;
    }

    .result-display {
      display: flex;
      align-items: baseline;
      gap: 0.375rem;
      margin-bottom: 0.375rem;
      transition: color var(--transition-med);
    }

    .result-display__value {
      font-family: var(--font-mono);
      font-size: 3rem;
      font-weight: 700;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
    }

    .result-display__unit {
      font-family: var(--font-mono);
      font-size: 1rem;
      font-weight: 400;
      color: var(--text-secondary);
      transition: color var(--transition-med);
    }

    .prompt-text {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-secondary);
      min-height: 1.25rem;
      transition: color var(--transition-med);
      margin-bottom: 1.25rem;
    }

    .stats {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      margin-bottom: 1.25rem;
    }

    .stats__notice {
      font-size: 0.75rem;
      color: var(--text-secondary);
      text-align: center;
    }

    .stats__grid {
      display: none;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
      text-align: center;
    }

    .stats__label {
      font-size: 0.625rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
      margin-bottom: 0.125rem;
    }

    .stats__value {
      font-family: var(--font-mono);
      font-size: 1rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .stats__value--best {
      color: var(--accent-success);
    }

    .stats__value--worst {
      color: var(--accent-error);
    }

    .history {
      width: 100%;
      display: none;
      flex: 1;
      min-height: 0;
    }

    .history__title {
      font-size: 0.625rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    .history__list {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      max-height: 180px;
      overflow-y: auto;
    }

    .history__item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.375rem 0.625rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) * 0.5);
      font-size: 0.75rem;
    }

    .history__item-index {
      color: var(--text-secondary);
      font-family: var(--font-mono);
      font-size: 0.6875rem;
    }

    .history__item-value {
      font-family: var(--font-mono);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .history__item-value--false-start {
      color: var(--accent-error);
    }

    .panel-footer {
      margin-top: auto;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .reset-btn {
      font-family: var(--font-ui);
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-secondary);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.5rem 1rem;
      cursor: pointer;
      width: 100%;
      transition: color var(--transition-fast), border-color var(--transition-fast);
    }

    .reset-btn:hover {
      color: var(--text-primary);
      border-color: var(--text-secondary);
    }

    /* =========================================================
       5. STATE VARIANTS
       ========================================================= */
    #app.state-waiting .prompt-text {
      color: var(--accent-stimulus);
    }

    #app.state-stimulus .result-display__value {
      color: var(--accent-stimulus);
    }

    #app.state-stimulus .prompt-text {
      color: var(--accent-stimulus);
    }

    #app.state-false-start .result-display__value {
      color: var(--accent-error);
    }

    #app.state-false-start .prompt-text {
      color: var(--accent-error);
    }

    #app.state-result .result-display__value {
      color: var(--accent-success);
    }

    #app.state-result .result-display__unit {
      color: var(--accent-success);
    }

    /* =========================================================
       6. ANIMATIONS
       ========================================================= */
    @keyframes pulse-subtle {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    #app.state-waiting .prompt-text {
      animation: pulse-subtle 1.8s ease-in-out infinite;
    }

    .history__list::-webkit-scrollbar,
    .side-panel::-webkit-scrollbar {
      width: 4px;
    }

    .history__list::-webkit-scrollbar-track,
    .side-panel::-webkit-scrollbar-track {
      background: transparent;
    }

    .history__list::-webkit-scrollbar-thumb,
    .side-panel::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    /* =========================================================
       7. RESPONSIVE — mobile bottom sheet
       ========================================================= */
    @media (max-width: 768px) {
      .side-panel {
        top: auto;
        bottom: 0;
        left: 0;
        right: 0;
        width: 100%;
        height: 55%;
        border-left: none;
        border-top: 1px solid var(--border);
        padding: 1.25rem;
      }

      .result-display__value {
        font-size: 2.5rem;
      }

      .history__list {
        max-height: 120px;
      }
    }

    @media (max-width: 480px) {
      .side-panel {
        height: 60%;
        padding: 1rem;
      }

      .result-display__value {
        font-size: 2.25rem;
      }
    }
  </style>

  <script>
    /* ===========================================================
       1. STATE OBJECT
       =========================================================== */
    const AppState = {
      phase: 'idle',
      stimulusTimestamp: null,
      currentDelay: null,
      stimulusTimeoutId: null,
      results: [],
      stats: { average: null, best: null, worst: null, validCount: 0 }
    };

    /* ===========================================================
       2. GAME ENGINE IIFE
       =========================================================== */
    const GameEngine = (function () {
      let dom = {};
      let onPhaseChange = null;

      function init(phaseChangeCallback) {
        onPhaseChange = phaseChangeCallback;

        dom.app = document.getElementById('app');
        dom.resultValue = document.getElementById('result-value');
        dom.resultUnit = document.getElementById('result-unit');
        dom.promptText = document.getElementById('prompt-text');
        dom.statsPanel = document.getElementById('stats-panel');
        dom.statsNotice = document.getElementById('stats-notice');
        dom.statsGrid = document.getElementById('stats-grid');
        dom.statAvg = document.getElementById('stat-avg');
        dom.statBest = document.getElementById('stat-best');
        dom.statWorst = document.getElementById('stat-worst');
        dom.statCount = document.getElementById('stat-count');
        dom.historyPanel = document.getElementById('history-panel');
        dom.historyList = document.getElementById('history-list');
        dom.resetBtn = document.getElementById('reset-btn');

        dom.app.addEventListener('click', handleAppClick);
        dom.app.addEventListener('keydown', handleKeyDown);
        dom.resetBtn.addEventListener('click', handleReset);

        dom.app.setAttribute('tabindex', '0');
        dom.app.focus();

        setPhase('idle');
      }

      function setPhase(newPhase) {
        AppState.phase = newPhase;
        dom.app.className = '';
        if (newPhase !== 'idle') {
          dom.app.classList.add('state-' + newPhase);
        }
        if (onPhaseChange) onPhaseChange(newPhase);
      }

      function handleAppClick(event) {
        if (event.target.closest('#reset-btn')) return;
        advanceGame();
      }

      function handleKeyDown(event) {
        if (event.code === 'Space' || event.code === 'Enter') {
          event.preventDefault();
          advanceGame();
        }
      }

      function handleReset(event) {
        event.stopPropagation();

        if (AppState.stimulusTimeoutId !== null) {
          clearTimeout(AppState.stimulusTimeoutId);
          AppState.stimulusTimeoutId = null;
        }

        AppState.results = [];
        AppState.stats = { average: null, best: null, worst: null, validCount: 0 };
        AppState.stimulusTimestamp = null;
        AppState.currentDelay = null;

        dom.resultValue.textContent = '---';
        dom.promptText.textContent = 'Click anywhere to start';
        dom.statsNotice.style.display = '';
        dom.statsGrid.style.display = 'none';
        dom.statAvg.textContent = '—';
        dom.statBest.textContent = '—';
        dom.statWorst.textContent = '—';
        dom.statCount.textContent = '0';
        dom.historyList.innerHTML = '';
        dom.historyPanel.style.display = 'none';

        setPhase('idle');
        dom.app.focus();
      }

      function advanceGame() {
        switch (AppState.phase) {
          case 'idle':
          case 'false-start':
          case 'result':
            startWaiting();
            break;
          case 'waiting':
            registerFalseStart();
            break;
          case 'stimulus':
            registerReaction();
            break;
        }
      }

      function startWaiting() {
        /* Random delay computed ONCE: 2000–5000ms.
           Stored in state so it's never recomputed mid-round. */
        AppState.currentDelay = 2000 + Math.random() * 3000;
        AppState.stimulusTimestamp = null;

        dom.resultValue.textContent = '---';
        dom.promptText.textContent = 'Wait for the signal\u2026';

        setPhase('waiting');

        /* Store timeout ID to cancel on false start or reset */
        AppState.stimulusTimeoutId = setTimeout(showStimulus, AppState.currentDelay);
      }

      function showStimulus() {
        AppState.stimulusTimeoutId = null;
        /* performance.now() — monotonic, sub-ms precision */
        AppState.stimulusTimestamp = performance.now();

        dom.resultValue.textContent = '!!!';
        dom.promptText.textContent = 'CLICK NOW!';

        setPhase('stimulus');
      }

      function registerFalseStart() {
        if (AppState.stimulusTimeoutId !== null) {
          clearTimeout(AppState.stimulusTimeoutId);
          AppState.stimulusTimeoutId = null;
        }

        AppState.results.push({ ms: null, falseStart: true, timestamp: Date.now() });

        dom.resultValue.textContent = 'TOO EARLY';
        dom.promptText.textContent = 'False start — click to try again';

        updateHistory();
        setPhase('false-start');
      }

      function registerReaction() {
        /* Delta from two performance.now() calls — monotonic,
           unaffected by system clock drift */
        var reactionMs = performance.now() - AppState.stimulusTimestamp;
        var rounded = Math.round(reactionMs);

        AppState.results.push({ ms: rounded, falseStart: false, timestamp: Date.now() });

        dom.resultValue.textContent = rounded.toString();
        dom.promptText.textContent = 'Click to go again';

        recalculateStats();
        updateStats();
        updateHistory();
        setPhase('result');
      }

      function recalculateStats() {
        var valid = AppState.results.filter(function (r) { return !r.falseStart; });
        AppState.stats.validCount = valid.length;

        if (valid.length === 0) {
          AppState.stats.average = null;
          AppState.stats.best = null;
          AppState.stats.worst = null;
          return;
        }

        var times = valid.map(function (r) { return r.ms; });
        AppState.stats.best = Math.min.apply(null, times);
        AppState.stats.worst = Math.max.apply(null, times);
        AppState.stats.average = Math.round(
          times.reduce(function (sum, t) { return sum + t; }, 0) / times.length
        );
      }

      function updateStats() {
        dom.statCount.textContent = AppState.stats.validCount.toString();

        /* 5-attempt threshold: a UX decision, not a statistical one */
        if (AppState.stats.validCount >= 5) {
          dom.statsNotice.style.display = 'none';
          dom.statsGrid.style.display = 'grid';
          dom.statAvg.textContent = AppState.stats.average + ' ms';
          dom.statBest.textContent = AppState.stats.best + ' ms';
          dom.statWorst.textContent = AppState.stats.worst + ' ms';
        } else {
          dom.statsNotice.style.display = '';
          dom.statsNotice.textContent =
            (5 - AppState.stats.validCount) + ' more attempt' +
            (5 - AppState.stats.validCount === 1 ? '' : 's') +
            ' until statistics';
          dom.statsGrid.style.display = 'none';
        }
      }

      function updateHistory() {
        dom.historyPanel.style.display = 'block';

        var result = AppState.results[AppState.results.length - 1];
        var index = AppState.results.length;

        var item = document.createElement('div');
        item.className = 'history__item';

        var indexEl = document.createElement('span');
        indexEl.className = 'history__item-index';
        indexEl.textContent = '#' + index;

        var valueEl = document.createElement('span');
        valueEl.className = 'history__item-value';

        if (result.falseStart) {
          valueEl.textContent = 'False Start';
          valueEl.classList.add('history__item-value--false-start');
        } else {
          valueEl.textContent = result.ms + ' ms';
        }

        item.appendChild(indexEl);
        item.appendChild(valueEl);
        dom.historyList.insertBefore(item, dom.historyList.firstChild);
      }

      return { init: init };
    })();


    /* ===========================================================
       3. VISUAL LAYER IIFE
       The 3D scene is now the visual hero. The camera is offset
       so the icosahedron appears centered in the open viewport
       area (left of the side panel on desktop, above the bottom
       sheet on mobile).
       =========================================================== */
    const VisualLayer = (function () {
      let scene, camera, renderer;
      let centralMesh;
      let orbiters = [];
      let elapsed = 0;

      const COLORS = {
        idle:           new THREE.Color(0x2E3138),
        waiting:        new THREE.Color(0x3A3F4A),
        stimulus:       new THREE.Color(0x4A9EFF),
        'false-start':  new THREE.Color(0xE05555),
        result:         new THREE.Color(0x4CAF7D)
      };

      let currentColor = new THREE.Color(0x2E3138);
      let targetColor = new THREE.Color(0x2E3138);

      const LERP_SPEED = 0.03;

      let pulseActive = false;
      let pulsePhase = 0;

      const CENTRAL_ROT_SPEED = 0.0015;

      function init() {
        var container = document.getElementById('canvas-container');

        scene = new THREE.Scene();

        camera = new THREE.PerspectiveCamera(
          60,
          window.innerWidth / window.innerHeight,
          0.1,
          1000
        );
        camera.position.z = 28;

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x0F1117, 1);

        container.appendChild(renderer.domElement);

        createCentralShape();
        createOrbiters();
        updateSceneCenter();

        window.addEventListener('resize', handleResize);
        animate();
      }

      /* Offset the camera so the 3D scene appears centered in the
         open area (viewport minus side panel), not the full viewport.
         Without this, the icosahedron would sit half-behind the panel
         on desktop, which defeats the "3D is the hero" intent. */
      function updateSceneCenter() {
        if (window.innerWidth > 768) {
          var panel = document.getElementById('side-panel');
          var panelW = panel ? panel.offsetWidth : 340;
          var openW = window.innerWidth - panelW;

          /* Convert the center of the open area to NDC [-1, 1],
             then to world-space X at the camera's Z distance.
             fov/2 = 30deg, so world half-width at z=28 is
             tan(30) * 28 * aspect. */
          var openCenterFrac = (openW / 2) / window.innerWidth;
          var ndcX = openCenterFrac * 2 - 1;
          var aspect = window.innerWidth / window.innerHeight;
          var worldHalfW = Math.tan(THREE.MathUtils.degToRad(30)) * 28 * aspect;
          camera.position.x = -(ndcX * worldHalfW);
        } else {
          /* Mobile: panel is at the bottom. Offset camera upward
             so the scene centers in the top portion. */
          var openH = window.innerHeight * 0.45;
          var openCenterYFrac = (openH / 2) / window.innerHeight;
          var ndcY = openCenterYFrac * 2 - 1;
          var worldHalfH = Math.tan(THREE.MathUtils.degToRad(30)) * 28;
          camera.position.x = 0;
          camera.position.y = -(ndcY * worldHalfH);
        }
      }

      function createCentralShape() {
        /* Prominent wireframe icosahedron. Detail 1 = 80 faces,
           enough geometry to read as spherical without visual noise.
           Opacity 0.35 — substantially higher than before since
           no text overlaps the 3D area anymore. */
        var geo = new THREE.IcosahedronGeometry(6.5, 1);
        var mat = new THREE.MeshBasicMaterial({
          color: currentColor.clone(),
          wireframe: true,
          transparent: true,
          opacity: 0.35
        });

        centralMesh = new THREE.Mesh(geo, mat);
        scene.add(centralMesh);
      }

      function createOrbiters() {
        var cubeGeo = new THREE.BoxGeometry(1, 1, 1);

        /* Hand-tuned orbit configs: radii, speeds, and inclinations
           chosen so paths don't overlap and the composition reads
           as an orbital system at camera.position.z = 28. */
        var configs = [
          { radius: 10, speed: 0.30, inc: 0.4,   phase: 0,              s: 0.9,  op: 0.30 },
          { radius: 12, speed: 0.22, inc: -0.6,  phase: Math.PI * 0.7,  s: 0.65, op: 0.25 },
          { radius: 9,  speed: 0.40, inc: 0.9,   phase: Math.PI * 1.3,  s: 0.55, op: 0.28 },
          { radius: 13, speed: 0.18, inc: -0.25, phase: Math.PI * 0.4,  s: 0.75, op: 0.22 },
          { radius: 11, speed: 0.28, inc: 1.2,   phase: Math.PI * 1.8,  s: 0.5,  op: 0.26 }
        ];

        for (var i = 0; i < configs.length; i++) {
          var c = configs[i];
          var mat = new THREE.MeshBasicMaterial({
            color: currentColor.clone(),
            wireframe: true,
            transparent: true,
            opacity: c.op
          });

          var mesh = new THREE.Mesh(cubeGeo, mat);
          mesh.scale.set(c.s, c.s, c.s);

          mesh.userData.orbitRadius = c.radius;
          mesh.userData.orbitSpeed = c.speed;
          mesh.userData.inclination = c.inc;
          mesh.userData.phaseOffset = c.phase;
          mesh.userData.baseOpacity = c.op;
          mesh.userData.selfRotSpeed = 0.008 + Math.random() * 0.012;

          scene.add(mesh);
          orbiters.push(mesh);
        }
      }

      function onPhaseChange(phase) {
        targetColor = COLORS[phase] ? COLORS[phase].clone() : COLORS.idle.clone();
        pulseActive = (phase === 'waiting');
        pulsePhase = 0;
      }

      function handleResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        updateSceneCenter();
      }

      function animate() {
        requestAnimationFrame(animate);

        var now = performance.now() * 0.001;
        var dt = Math.min(now - elapsed, 0.05);
        if (dt <= 0) dt = 0.016;
        elapsed = now;

        currentColor.lerp(targetColor, LERP_SPEED);

        if (pulseActive) {
          pulsePhase += dt * 2.5;
        }

        /* --- Central icosahedron --- */
        centralMesh.rotation.x += CENTRAL_ROT_SPEED;
        centralMesh.rotation.y += CENTRAL_ROT_SPEED * 0.7;
        centralMesh.material.color.copy(currentColor);

        if (pulseActive) {
          var cp = 0.5 + 0.5 * Math.sin(pulsePhase);
          centralMesh.material.opacity = 0.25 + 0.20 * cp;
        } else {
          centralMesh.material.opacity = 0.35;
        }

        /* --- Orbiting cubes --- */
        for (var i = 0; i < orbiters.length; i++) {
          var orb = orbiters[i];
          var d = orb.userData;

          var angle = elapsed * d.orbitSpeed + d.phaseOffset;
          var r = d.orbitRadius;

          /* Elliptical: X full, Z at 70% for depth */
          var x = r * Math.cos(angle);
          var z = r * 0.7 * Math.sin(angle);

          /* Inclination tilts the orbital plane */
          var cosI = Math.cos(d.inclination);
          var sinI = Math.sin(d.inclination);
          orb.position.set(x, z * sinI, z * cosI);

          orb.rotation.x += d.selfRotSpeed;
          orb.rotation.y += d.selfRotSpeed * 0.6;

          orb.material.color.copy(currentColor);

          if (pulseActive) {
            var pf = 0.5 + 0.5 * Math.sin(pulsePhase + i * 0.9);
            orb.material.opacity = d.baseOpacity * (0.5 + 0.5 * pf);
          } else {
            orb.material.opacity = d.baseOpacity;
          }
        }

        renderer.render(scene, camera);
      }

      return { init: init, onPhaseChange: onPhaseChange };
    })();


    /* ===========================================================
       4. BOOT
       =========================================================== */
    (function boot() {
      VisualLayer.init();
      GameEngine.init(VisualLayer.onPhaseChange);
    })();
  </script>
