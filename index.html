<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reaction Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

  <!-- Three.js renders behind everything — this canvas is injected by VisualLayer -->
  <div id="canvas-container"></div>

  <div id="app">
    <header class="header">
      <div class="header__title">REACTION TIMER</div>
      <div class="header__subtitle">Measure your response latency</div>
    </header>

    <main class="main">
      <!-- The hero element: reaction time display -->
      <div class="result-display" id="result-display">
        <div class="result-display__value" id="result-value">---</div>
        <div class="result-display__unit" id="result-unit">ms</div>
      </div>

      <div class="prompt-text" id="prompt-text">Click anywhere to start</div>

      <!-- Stats panel — only meaningful after 5+ attempts -->
      <div class="stats" id="stats-panel">
        <div class="stats__notice" id="stats-notice">Complete 5 attempts to see statistics</div>
        <div class="stats__grid" id="stats-grid">
          <div class="stats__item">
            <div class="stats__label">Average</div>
            <div class="stats__value" id="stat-avg">—</div>
          </div>
          <div class="stats__item">
            <div class="stats__label">Best</div>
            <div class="stats__value stats__value--best" id="stat-best">—</div>
          </div>
          <div class="stats__item">
            <div class="stats__label">Worst</div>
            <div class="stats__value stats__value--worst" id="stat-worst">—</div>
          </div>
          <div class="stats__item">
            <div class="stats__label">Attempts</div>
            <div class="stats__value" id="stat-count">0</div>
          </div>
        </div>
      </div>

      <!-- Attempt history log -->
      <div class="history" id="history-panel">
        <div class="history__title">Session Log</div>
        <div class="history__list" id="history-list"></div>
      </div>
    </main>

    <footer class="footer">
      <button class="reset-btn" id="reset-btn">Reset Session</button>
    </footer>
  </div>

  <style>
    /* =========================================================
       1. CSS CUSTOM PROPERTIES / DESIGN TOKENS
       ========================================================= */
    :root {
      --bg: #0F1117;
      --surface: #1C1F26;
      --border: #2E3138;
      --text-primary: #E8EAF0;
      --text-secondary: #8B909A;
      --accent-stimulus: #4A9EFF;
      --accent-error: #E05555;
      --accent-success: #4CAF7D;
      --font-ui: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --radius: 8px;
      --transition-fast: 150ms ease;
      --transition-med: 300ms ease;
    }

    /* =========================================================
       2. RESET AND BASE STYLES
       ========================================================= */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font-ui);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* =========================================================
       3. LAYOUT
       ========================================================= */
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    #canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1.5rem;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 480px;
    }

    .footer {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      width: 100%;
      max-width: 480px;
      display: flex;
      justify-content: center;
    }

    /* =========================================================
       4. COMPONENTS
       ========================================================= */

    /* Header */
    .header__title {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      color: var(--text-secondary);
    }

    .header__subtitle {
      font-size: 0.8125rem;
      color: var(--text-secondary);
      margin-top: 0.25rem;
      opacity: 0.6;
    }

    /* Result display — the hero element */
    .result-display {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 0.5rem;
      margin: 1.5rem 0 1rem;
      transition: color var(--transition-med);
    }

    .result-display__value {
      font-family: var(--font-mono);
      font-size: clamp(3.5rem, 12vw, 6rem);
      font-weight: 700;
      line-height: 1;
      /* JetBrains Mono has tabular figures by default —
         this prevents layout shift as digits change */
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
    }

    .result-display__unit {
      font-family: var(--font-mono);
      font-size: 1.25rem;
      font-weight: 400;
      color: var(--text-secondary);
      transition: color var(--transition-med);
    }

    /* Prompt text — instruction area below the hero number */
    .prompt-text {
      font-size: 1rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-align: center;
      min-height: 1.5rem;
      transition: color var(--transition-med);
      margin-bottom: 2.5rem;
    }

    /* Stats panel */
    .stats {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }

    .stats__notice {
      font-size: 0.8125rem;
      color: var(--text-secondary);
      text-align: center;
    }

    .stats__grid {
      display: none;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.75rem;
      text-align: center;
    }

    .stats__label {
      font-size: 0.6875rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
      margin-bottom: 0.25rem;
    }

    .stats__value {
      font-family: var(--font-mono);
      font-size: 1.125rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .stats__value--best {
      color: var(--accent-success);
    }

    .stats__value--worst {
      color: var(--accent-error);
    }

    /* History log */
    .history {
      width: 100%;
      display: none;
    }

    .history__title {
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-secondary);
      margin-bottom: 0.75rem;
    }

    .history__list {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
      max-height: 200px;
      overflow-y: auto;
    }

    .history__item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) * 0.5);
      font-size: 0.8125rem;
    }

    .history__item-index {
      color: var(--text-secondary);
      font-family: var(--font-mono);
      font-size: 0.75rem;
    }

    .history__item-value {
      font-family: var(--font-mono);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .history__item-value--false-start {
      color: var(--accent-error);
    }

    /* Reset button */
    .reset-btn {
      font-family: var(--font-ui);
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-secondary);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.5rem 1.25rem;
      cursor: pointer;
      transition: color var(--transition-fast), border-color var(--transition-fast);
    }

    .reset-btn:hover {
      color: var(--text-primary);
      border-color: var(--text-secondary);
    }

    /* =========================================================
       5. STATE VARIANTS — applied to #app via JS
       ========================================================= */
    #app.state-waiting .prompt-text {
      color: var(--accent-stimulus);
    }

    #app.state-stimulus .result-display__value {
      color: var(--accent-stimulus);
    }

    #app.state-stimulus .prompt-text {
      color: var(--accent-stimulus);
    }

    #app.state-false-start .result-display__value {
      color: var(--accent-error);
    }

    #app.state-false-start .prompt-text {
      color: var(--accent-error);
    }

    #app.state-result .result-display__value {
      color: var(--accent-success);
    }

    #app.state-result .result-display__unit {
      color: var(--accent-success);
    }

    /* =========================================================
       6. ANIMATIONS
       ========================================================= */
    @keyframes pulse-subtle {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    #app.state-waiting .prompt-text {
      animation: pulse-subtle 1.8s ease-in-out infinite;
    }

    /* Scrollbar styling for history */
    .history__list::-webkit-scrollbar {
      width: 4px;
    }

    .history__list::-webkit-scrollbar-track {
      background: transparent;
    }

    .history__list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    /* Responsive adjustments */
    @media (max-width: 480px) {
      .stats__grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
      }
    }
  </style>

  <script>
    /* ===========================================================
       1. STATE OBJECT
       Single source of truth for all application state.
       No global variables outside this object.
       =========================================================== */
    const AppState = {
      /* Game phase: 'idle' | 'waiting' | 'stimulus' | 'false-start' | 'result' */
      phase: 'idle',

      /* Timestamp (performance.now) when the stimulus was shown.
         We use performance.now() because it provides sub-millisecond
         precision from a monotonic clock — Date.now() uses the system
         clock which can be adjusted and only guarantees ms resolution. */
      stimulusTimestamp: null,

      /* The random delay for the current round, in ms.
         Computed once when entering the 'waiting' phase and never
         recomputed — prevents any possibility of the delay changing
         mid-round due to a re-render or state check. */
      currentDelay: null,

      /* Handle to the stimulus setTimeout so we can cancel it on
         false starts or resets without orphaning timers. */
      stimulusTimeoutId: null,

      /* Array of result objects: { ms: number|null, falseStart: boolean, timestamp: number }
         null ms with falseStart=true indicates a false start attempt. */
      results: [],

      /* Computed stats — recalculated on every valid result.
         Only displayed when validCount >= 5 (see spec note:
         5 is a UX threshold, not a statistical one — the sample
         is too small for real confidence intervals regardless). */
      stats: {
        average: null,
        best: null,
        worst: null,
        validCount: 0
      }
    };

    /* ===========================================================
       2. GAME ENGINE IIFE
       All game logic, timing, state transitions, and DOM updates.
       No Three.js references. Communicates with VisualLayer
       through a callback (onPhaseChange).
       =========================================================== */
    const GameEngine = (function () {
      /* --- DOM references (cached once at init) --- */
      let dom = {};

      /* --- Callback to notify VisualLayer of phase changes --- */
      let onPhaseChange = null;

      /* ---- Initialisation ---- */
      function init(phaseChangeCallback) {
        onPhaseChange = phaseChangeCallback;

        dom.app = document.getElementById('app');
        dom.resultValue = document.getElementById('result-value');
        dom.resultUnit = document.getElementById('result-unit');
        dom.promptText = document.getElementById('prompt-text');
        dom.statsPanel = document.getElementById('stats-panel');
        dom.statsNotice = document.getElementById('stats-notice');
        dom.statsGrid = document.getElementById('stats-grid');
        dom.statAvg = document.getElementById('stat-avg');
        dom.statBest = document.getElementById('stat-best');
        dom.statWorst = document.getElementById('stat-worst');
        dom.statCount = document.getElementById('stat-count');
        dom.historyPanel = document.getElementById('history-panel');
        dom.historyList = document.getElementById('history-list');
        dom.resetBtn = document.getElementById('reset-btn');

        /* Bind interaction areas.
           The entire #app is the click target for game actions.
           The reset button gets its own handler and stops propagation
           so it doesn't trigger a game action. */
        dom.app.addEventListener('click', handleAppClick);
        dom.app.addEventListener('keydown', handleKeyDown);
        dom.resetBtn.addEventListener('click', handleReset);

        /* Make #app focusable for keyboard input */
        dom.app.setAttribute('tabindex', '0');
        dom.app.focus();

        setPhase('idle');
      }

      /* ---- Phase transition ---- */
      function setPhase(newPhase) {
        AppState.phase = newPhase;

        /* Strip all state classes, apply the new one */
        dom.app.className = '';
        if (newPhase !== 'idle') {
          dom.app.classList.add('state-' + newPhase);
        }

        /* Notify visual layer */
        if (onPhaseChange) {
          onPhaseChange(newPhase);
        }
      }

      /* ---- Input handlers ---- */
      function handleAppClick(event) {
        /* Prevent reset button clicks from triggering game logic */
        if (event.target.closest('#reset-btn')) return;
        advanceGame();
      }

      function handleKeyDown(event) {
        if (event.code === 'Space' || event.code === 'Enter') {
          event.preventDefault();
          advanceGame();
        }
      }

      function handleReset(event) {
        event.stopPropagation();

        /* Clear any pending stimulus timer */
        if (AppState.stimulusTimeoutId !== null) {
          clearTimeout(AppState.stimulusTimeoutId);
          AppState.stimulusTimeoutId = null;
        }

        /* Reset all state */
        AppState.results = [];
        AppState.stats = { average: null, best: null, worst: null, validCount: 0 };
        AppState.stimulusTimestamp = null;
        AppState.currentDelay = null;

        /* Reset DOM */
        dom.resultValue.textContent = '---';
        dom.promptText.textContent = 'Click anywhere to start';
        dom.statsNotice.style.display = '';
        dom.statsGrid.style.display = 'none';
        dom.statAvg.textContent = '—';
        dom.statBest.textContent = '—';
        dom.statWorst.textContent = '—';
        dom.statCount.textContent = '0';
        dom.historyList.innerHTML = '';
        dom.historyPanel.style.display = 'none';

        setPhase('idle');
        dom.app.focus();
      }

      /* ---- Core game logic ---- */
      function advanceGame() {
        switch (AppState.phase) {
          case 'idle':
          case 'false-start':
          case 'result':
            startWaiting();
            break;

          case 'waiting':
            registerFalseStart();
            break;

          case 'stimulus':
            registerReaction();
            break;
        }
      }

      function startWaiting() {
        /* Compute the random delay ONCE for this round.
           Range: 2000–5000ms inclusive.
           Math.random() returns [0, 1), so the effective max is
           just under 5000ms. This is acceptable — we don't need
           exact endpoint inclusion for a perceptual delay. */
        AppState.currentDelay = 2000 + Math.random() * 3000;
        AppState.stimulusTimestamp = null;

        dom.resultValue.textContent = '---';
        dom.promptText.textContent = 'Wait for the signal\u2026';

        setPhase('waiting');

        /* Schedule stimulus presentation.
           We store the timeout ID so it can be cancelled on false
           start or reset — orphaned timers would fire showStimulus
           in the wrong game phase. */
        AppState.stimulusTimeoutId = setTimeout(showStimulus, AppState.currentDelay);
      }

      function showStimulus() {
        AppState.stimulusTimeoutId = null;

        /* Record the high-resolution timestamp at stimulus onset.
           This is the reference point for reaction time calculation.
           performance.now() gives us a DOMHighResTimeStamp in ms
           with microsecond precision — critical for sub-10ms accuracy. */
        AppState.stimulusTimestamp = performance.now();

        dom.resultValue.textContent = '!!!';
        dom.promptText.textContent = 'CLICK NOW!';

        setPhase('stimulus');
      }

      function registerFalseStart() {
        /* Cancel the pending stimulus timer.
           Without this, showStimulus would fire after we've already
           moved to the false-start phase, corrupting the state machine. */
        if (AppState.stimulusTimeoutId !== null) {
          clearTimeout(AppState.stimulusTimeoutId);
          AppState.stimulusTimeoutId = null;
        }

        AppState.results.push({
          ms: null,
          falseStart: true,
          timestamp: Date.now()
        });

        dom.resultValue.textContent = 'TOO EARLY';
        dom.promptText.textContent = 'False start — click to try again';

        updateHistory();
        setPhase('false-start');
      }

      function registerReaction() {
        /* Calculate reaction time as the delta between now and
           when the stimulus was shown. Both values come from
           performance.now() so we get a monotonic, high-resolution
           measurement unaffected by system clock adjustments. */
        const reactionMs = performance.now() - AppState.stimulusTimestamp;
        const rounded = Math.round(reactionMs);

        AppState.results.push({
          ms: rounded,
          falseStart: false,
          timestamp: Date.now()
        });

        dom.resultValue.textContent = rounded.toString();
        dom.promptText.textContent = 'Click to go again';

        recalculateStats();
        updateStats();
        updateHistory();
        setPhase('result');
      }

      /* ---- Stats computation ---- */
      function recalculateStats() {
        const valid = AppState.results.filter(function (r) { return !r.falseStart; });
        AppState.stats.validCount = valid.length;

        if (valid.length === 0) {
          AppState.stats.average = null;
          AppState.stats.best = null;
          AppState.stats.worst = null;
          return;
        }

        const times = valid.map(function (r) { return r.ms; });
        AppState.stats.best = Math.min.apply(null, times);
        AppState.stats.worst = Math.max.apply(null, times);
        AppState.stats.average = Math.round(
          times.reduce(function (sum, t) { return sum + t; }, 0) / times.length
        );
      }

      /* ---- DOM updates ---- */
      function updateStats() {
        dom.statCount.textContent = AppState.stats.validCount.toString();

        /* Only show computed stats after 5 valid attempts.
           This is a UX threshold — with <5 samples the numbers
           fluctuate too much to be useful to the user, but calling
           it "statistically meaningful" would be overclaiming. */
        if (AppState.stats.validCount >= 5) {
          dom.statsNotice.style.display = 'none';
          dom.statsGrid.style.display = 'grid';
          dom.statAvg.textContent = AppState.stats.average + ' ms';
          dom.statBest.textContent = AppState.stats.best + ' ms';
          dom.statWorst.textContent = AppState.stats.worst + ' ms';
        } else {
          dom.statsNotice.style.display = '';
          dom.statsNotice.textContent =
            (5 - AppState.stats.validCount) + ' more attempt' +
            (5 - AppState.stats.validCount === 1 ? '' : 's') +
            ' until statistics';
          dom.statsGrid.style.display = 'none';
        }
      }

      function updateHistory() {
        dom.historyPanel.style.display = 'block';

        const result = AppState.results[AppState.results.length - 1];
        const index = AppState.results.length;

        const item = document.createElement('div');
        item.className = 'history__item';

        const indexEl = document.createElement('span');
        indexEl.className = 'history__item-index';
        indexEl.textContent = '#' + index;

        const valueEl = document.createElement('span');
        valueEl.className = 'history__item-value';

        if (result.falseStart) {
          valueEl.textContent = 'False Start';
          valueEl.classList.add('history__item-value--false-start');
        } else {
          valueEl.textContent = result.ms + ' ms';
        }

        item.appendChild(indexEl);
        item.appendChild(valueEl);

        /* Prepend so newest is on top */
        dom.historyList.insertBefore(item, dom.historyList.firstChild);
      }

      /* Public API */
      return { init: init };
    })();


    /* ===========================================================
       3. VISUAL LAYER IIFE
       All Three.js logic. Receives phase change notifications
       from GameEngine. No game logic here.
       =========================================================== */
    const VisualLayer = (function () {
      let scene, camera, renderer;
      let meshes = [];
      let clock;

      /* Colour targets — we lerp toward these based on game phase */
      const COLORS = {
        idle:        new THREE.Color(0x2E3138),
        waiting:     new THREE.Color(0x3A3F4A),
        stimulus:    new THREE.Color(0x4A9EFF),
        'false-start': new THREE.Color(0xE05555),
        result:      new THREE.Color(0x4CAF7D)
      };

      let currentColor = new THREE.Color(0x2E3138);
      let targetColor = new THREE.Color(0x2E3138);

      /* Lerp speed — controls how fast colour transitions happen.
         0.03 gives a smooth ~1s transition at 60fps. */
      const LERP_SPEED = 0.03;

      /* Pulse state for waiting phase */
      let pulseActive = false;
      let pulsePhase = 0;

      function init() {
        const container = document.getElementById('canvas-container');

        scene = new THREE.Scene();

        camera = new THREE.PerspectiveCamera(
          60,
          window.innerWidth / window.innerHeight,
          0.1,
          1000
        );
        camera.position.z = 30;

        renderer = new THREE.WebGLRenderer({
          antialias: true,
          alpha: true
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x0F1117, 1);

        container.appendChild(renderer.domElement);

        clock = new THREE.Clock();

        createGeometry();

        window.addEventListener('resize', handleResize);

        animate();
      }

      function createGeometry() {
        /* Create a set of wireframe icosahedrons at varying positions
           and sizes. Wireframe on MeshBasicMaterial is the cleanest
           approach in r128 — no lighting needed, colour lerps directly
           on the material. The visual effect on thin lines is subtle
           but sufficient for the background role. */
        const geometry = new THREE.IcosahedronGeometry(1, 1);

        for (var i = 0; i < 8; i++) {
          var material = new THREE.MeshBasicMaterial({
            color: currentColor.clone(),
            wireframe: true,
            transparent: true,
            opacity: 0.12 + Math.random() * 0.08
          });

          var mesh = new THREE.Mesh(geometry, material);

          /* Distribute icosahedrons in a loose cloud.
             Random positions keep the background from looking
             patterned or intentionally arranged. */
          mesh.position.set(
            (Math.random() - 0.5) * 40,
            (Math.random() - 0.5) * 25,
            (Math.random() - 0.5) * 20
          );

          var scale = 1.5 + Math.random() * 3.5;
          mesh.scale.set(scale, scale, scale);

          /* Store per-mesh rotation speeds for organic motion */
          mesh.userData.rotSpeedX = (Math.random() - 0.5) * 0.003;
          mesh.userData.rotSpeedY = (Math.random() - 0.5) * 0.003;
          mesh.userData.rotSpeedZ = (Math.random() - 0.5) * 0.002;

          /* Store base opacity so pulse can modulate it */
          mesh.userData.baseOpacity = material.opacity;

          scene.add(mesh);
          meshes.push(mesh);
        }
      }

      function onPhaseChange(phase) {
        targetColor = COLORS[phase] ? COLORS[phase].clone() : COLORS.idle.clone();
        pulseActive = (phase === 'waiting');
        pulsePhase = 0;
      }

      function handleResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }

      function animate() {
        requestAnimationFrame(animate);

        var dt = clock.getDelta();

        /* Linearly interpolate current colour toward target.
           We lerp per-frame rather than using a CSS transition
           because the material colour lives in WebGL, not the DOM. */
        currentColor.lerp(targetColor, LERP_SPEED);

        /* Pulse modulation for waiting phase */
        if (pulseActive) {
          pulsePhase += dt * 2.5;
        }

        for (var i = 0; i < meshes.length; i++) {
          var mesh = meshes[i];

          /* Slow ambient rotation */
          mesh.rotation.x += mesh.userData.rotSpeedX;
          mesh.rotation.y += mesh.userData.rotSpeedY;
          mesh.rotation.z += mesh.userData.rotSpeedZ;

          /* Update material colour to the interpolated value */
          mesh.material.color.copy(currentColor);

          /* Pulse opacity during waiting phase */
          if (pulseActive) {
            var pulseFactor = 0.5 + 0.5 * Math.sin(pulsePhase + i * 0.7);
            mesh.material.opacity = mesh.userData.baseOpacity * (0.6 + 0.4 * pulseFactor);
          } else {
            mesh.material.opacity = mesh.userData.baseOpacity;
          }
        }

        renderer.render(scene, camera);
      }

      /* Public API */
      return {
        init: init,
        onPhaseChange: onPhaseChange
      };
    })();


    /* ===========================================================
       4. BOOT
       Initialise both modules and wire them together.
       VisualLayer.onPhaseChange is passed as a callback to
       GameEngine so the game logic can notify the visual layer
       without either module importing the other directly.
       =========================================================== */
    (function boot() {
      VisualLayer.init();
      GameEngine.init(VisualLayer.onPhaseChange);
    })();
  </script>

</body>
